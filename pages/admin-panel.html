<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Plot Twist</title>
    <link rel="icon" type="image/png" href="../public/tab-icon.png">
    <link rel="stylesheet" href="/style/style.css">
</head>

<body>
    <header class="site-header">
    </header>

    <script type="module">
        import { renderHeader } from "../src/utils/renderHeader.js";
        renderHeader();
    </script>

    <main class="main-content">
        <h1>Admin Dashboard</h1>

        <div class="admin-controls">
            <button id="show-plants" class="btn-tab active">Manage Plants</button>
            <button id="show-users" class="btn-tab">Manage Users</button>
        </div>

        <section id="admin-list-container">
            <h2 id="list-title">Plants</h2>

            <div class="admin-table-wrapper">
                <table class="admin-table">
                    <thead>
                        <tr id="table-head">
                        </tr>
                    </thead>
                    <tbody id="admin-tbody">
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script type="module" src="../src/scripts/admin-panel.js"></script>

    <footer class="site-footer">
        <div class="footer-content">
            <p>&copy; 2026 Plot Twist. All rights reserved.</p>
        </div>
    </footer>
</body>

</html>
