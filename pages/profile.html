<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile - Plot Twist</title>
  <link rel="icon" type="image/png" href="../public/tab-icon.png">
  <link rel="stylesheet" href="/style/style.css" />
</head>

<body>
  <header class="site-header">
  </header>

  <script type="module">
    import { renderHeader } from "../src/utils/renderHeader.js";
    renderHeader();
  </script>

  <main class="profile-main">
    <h1>Din Profil</h1>

    <section class="profile-section">
      <h2>
        <img src="../public/notification-icon.png" alt="" class="section-icon">
        Inkommande förfrågningar
      </h2>
      <div id="pendingContainer" class="horizontal-scroll"></div>
    </section>

    <section class="profile-section">
      <h2>
        <img src="../public/sent-icon.png" alt="" class="section-icon">
        Mina skickade förfrågningar
      </h2>
      <div id="outgoingContainer" class="horizontal-scroll"></div>
    </section>

    <section class="profile-section">
      <h2>
        <img src="../public/history-icon.png" alt="" class="section-icon">
        Byteshistorik
      </h2>
      <div id="historyContainer" class="list-view"></div>
    </section>
  </main>

  <script type="module" src="../src/scripts/profile.js"></script>

  <footer class="site-footer">
    <div class="footer-content">
      <p>&copy; 2026 Plot Twist. All rights reserved.</p>
    </div>
  </footer>
  
</body>

</html>
