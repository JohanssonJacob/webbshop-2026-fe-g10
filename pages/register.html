<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Plot Twist</title>
  <link rel="stylesheet" href="/style/style.css" />
</head>

<body>

  <!-- HEADER -->
  <header class="site-header">
    <nav>
      <a href="../index.html" class="logo">Plot Twist</a>
      <ul class="nav-links">
        <li><a href="/pages/products.html">Products</a></li>
        <li><a href="/pages/cart.html">Cart (0)</a></li>
        <li><a href="/pages/register.html">Login</a></li>
        <li><a href="/pages/admin.html">Admin</a></li>
      </ul>
    </nav>
  </header>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <h1 id="form-title">Login</h1>

    <div id="register-container" class="register-wrapper">
      <form id="authForm" class="register-form">

        <div class="form-group hidden" id="name-group">
          <label for="name">Name</label>
          <input type="text" id="name" />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required />
        </div>

        <button type="submit" id="submit-btn">Login</button>
      </form>

      <p class="switch-text">
        <span id="switch-msg">Don't have an account?</span>
        <button type="button" id="switch-btn" class="btn-link">Register here</button>
      </p>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-content">
      <p>&copy; 2026 Plot Twist. All rights reserved.</p>
      <div class="footer-links">
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
        <a href="/terms">Terms</a>
      </div>
    </div>
  </footer>

  <script type="module" src="/src/scripts/register.js"></script>
</body>

</html>
