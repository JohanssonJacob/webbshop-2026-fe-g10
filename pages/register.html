<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Plot Twist</title>
  <link rel="icon" type="image/png" href="../public/tab-icon.png">
  <link rel="stylesheet" href="/style/style.css" />
</head>

<body>

  <!-- HEADER -->
  <header class="site-header">
  </header>

  <script type="module">
    import { renderHeader } from "../src/utils/renderHeader.js";
    renderHeader();
  </script>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <h1 id="form-title">Login</h1>

    <div id="register-container" class="register-wrapper">
      <form id="authForm" class="register-form">

        <div class="form-group hidden" id="name-group">
          <label for="name">Name</label>
          <input type="text" id="name" />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required />
        </div>

        <button type="submit" id="submit-btn">Login</button>
      </form>

      <p class="switch-text">
        <span id="switch-msg">Don't have an account?</span>
        <button type="button" id="switch-btn" class="btn-link">Register here</button>
      </p>
    </div>
  </main>

  <!-- FOOTER -->

  <script type="module" src="/src/scripts/register.js"></script>

  <footer class="site-footer">
    <div class="footer-content">
      <p>&copy; 2026 Plot Twist. All rights reserved.</p>
    </div>
  </footer>

</body>

</html>
