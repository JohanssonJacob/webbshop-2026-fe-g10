<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plot Twist</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="/style/style.css" />
  <link rel="stylesheet" href="/style/admin.css" />
</head>

<body>
  <header class="site-header">
  </header>

  <script type="module">
    import { renderHeader } from "../src/utils/renderHeader.js";
    renderHeader();
  </script>

  <main class="admin-main">
    <h1>Upload Plant</h1>

    <form id="createProductForm" class="admin-form">

      <div class="admin-form-row">
        <label for="name">Plant Name</label>
        <input type="text" id="name" required />
      </div>

      <div class="admin-form-row">
        <label for="description">Description</label>
        <input type="text" id="description" required />
      </div>

      <div class="admin-form-row">
        <label for="image">Image URL</label>
        <input type="url" id="image" required />
      </div>

      <div class="admin-form-row">
        <label for="lightLevel">Light Level</label>
        <select id="lightLevel" required>
          <option value="1">Low</option>
          <option value="2">Medium</option>
          <option value="3">High</option>
        </select>
      </div>

      <p>Click on the map to select location 📍</p>
      <h3>Select location</h3>
      <div id="adminMap" style="height: 300px; margin-top: 10px;"></div>
      <p id="coordsText"></p>

      <button type="submit">Create Plant</button>
    </form>
  </main>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script type="module" src="../src/scripts/uploadPlant.js"></script>

  <footer class="site-footer">
    <div class="footer-content">
      <p>&copy; 2026 Plot Twist. All rights reserved.</p>
    </div>
  </footer>

</body>

</html>
